name: Deploy to Scaleway

on:
  push:
    branches: [main]

env:
  REGISTRY: rg.fr-par.scw.cloud
  NAMESPACE: legomnia-website

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Scaleway Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: rg.fr-par.scw.cloud/legomnia-website/backend:latest

      - name: Redeploy Backend on Scaleway
        run: |
          curl -s -X POST \
            -H "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            "https://api.scaleway.com/containers/v1beta1/regions/fr-par/containers/${{ secrets.SCW_BACKEND_CONTAINER_ID }}/deploy"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Login to Scaleway Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: rg.fr-par.scw.cloud/legomnia-website/frontend:latest

      - name: Redeploy Frontend on Scaleway
        run: |
          curl -s -X POST \
            -H "X-Auth-Token: ${{ secrets.SCW_SECRET_KEY }}" \
            "https://api.scaleway.com/containers/v1beta1/regions/fr-par/containers/${{ secrets.SCW_FRONTEND_CONTAINER_ID }}/deploy"
