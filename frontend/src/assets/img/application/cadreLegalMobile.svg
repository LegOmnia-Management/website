  </text>

  <text x="40" y="355"
        font-size="12"
        font-family="Arial"
        fill="#4B5563">
    et M. X.DEF devant la juridiction :
  </text>

  <!-- Bullet list -->
  <text x="58" y="400"
        font-size="12"
        font-family="Arial"
        fill="#6B7280">
    — Déclarer son action recevable
  </text>

  <text x="58" y="422"
        font-size="12"
        font-family="Arial"
        fill="#6B7280">
