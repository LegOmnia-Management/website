  </text>

  <!-- Paragraph -->
  <text x="40" y="315"
        font-size="12"
        font-family="Arial"
        fill="#4B5563">
    Suivant acte du 21 mai 2024, la SCI EMEROD
  </text>

  <text x="40" y="335"
        font-size="12"
        font-family="Arial"
        fill="#4B5563">
