  <rect x="56" y="209" width="18" height="18" rx="5" fill="#EEF2FF"/>
  <rect x="84" y="209" width="18" height="18" rx="5" fill="#EEF2FF"/>
  <rect x="112" y="209" width="18" height="18" rx="5" fill="#6366F1"/>

  <!-- Title -->
  <text x="40" y="280"
