server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Redirige toutes les routes vers index.html (SPA React)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend pour /api/*
    location /api/ {
        proxy_pass https://legomnia-backend-xxxx.functions.fnc.fr-par.scw.cloud;
        proxy_set_header Host $host;
    }
}
