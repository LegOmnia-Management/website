server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://legomniabackend61be1382-legomnia-backend.functions.fnc.fr-par.scw.cloud;
        proxy_set_header Host legomniabackend61be1382-legomnia-backend.functions.fnc.fr-par.scw.cloud;
    }
}
