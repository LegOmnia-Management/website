<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Données structurées Organisation (schema.org) -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Organization",
            "name": "LegOmnia",
            "url": "https://legomnia.com",
            "logo": "https://legomnia.com/favicon.svg",
            "description": "Infrastructure juridique numérique de l'Afrique francophone : IA souveraine, data juridique fiable, accès au droit pour tous.",
            "sameAs": ["https://www.linkedin.com/company/legomnia"],
            "address": {
                "@type": "PostalAddress",
                "streetAddress": "8 rue du Chevalier de la Barre",
                "addressLocality": "Paris",
                "postalCode": "75018",
                "addressCountry": "FR"
            },
            "contactPoint": {
                "@type": "ContactPoint",
                "contactType": "customer service",
                "url": "https://legomnia.com/contact"
            }
        }
        </script>

        <!-- Polices -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Ibarra+Real+Nova:ital,wght@0,400..700;1,400..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
        <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    </head>

    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
